services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_DB: telegram_panel
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: Navneetbb1###@
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5436:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    command: redis-server --requirepass Navneetbb1###
    volumes:
      - redis_data:/data
    ports:
      - "6389:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    ports:
      - "3000:3000"
    env_file:
      - ./backend/.env
    environment:
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=telegram_panel
      - DB_USER=postgres
      - DB_PASSWORD=Navneetbb1###@
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=Navneetbb1###
      - JWT_SECRET=zI1zt20iQZ/uW+L+90SXj7QkGHTFwoEJOezPrUBJCgo4CvkEMpWaPHGh8YhFNtT9
      - JWT_EXPIRE=7d
      - PORT=3000
      - NODE_ENV=development
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend/uploads:/app/uploads
      - ./backend/logs:/app/logs

  frontend:
    build: ./frontend
    ports:
      - "8080:80"
    depends_on:
      - backend

volumes:
  postgres_data:
  redis_data:
