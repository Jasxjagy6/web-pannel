name: build-backend

# Build the backend image on every push to main and on tags. The resulting
# image is pushed to GHCR with three tags:
#   - the full git SHA (e.g. `abcdef0123456789…`) — the canonical immutable tag
#   - the short SHA   (e.g. `abcdef01234`) — what `bin/upgrade --build registry`
#     pulls by default
#   - `latest` (only on main pushes)
#
# `bin/upgrade --build registry` resolves a ref to a SHA via `git rev-parse`
# and pulls the matching tag. So as long as the SHA is published here, the
# orchestrator on the VPS can deploy it.

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:
    inputs:
      ref:
        description: 'git ref to build'
        required: false
        default: ''

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.ref || github.ref }}
          fetch-depth: 0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute tags
        id: meta
        run: |
          OWNER_LC="$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')"
          REPO="ghcr.io/${OWNER_LC}/web-pannel-backend"
          SHORT="$(git rev-parse --short=12 HEAD)"
          FULL="$(git rev-parse HEAD)"
          BUILD_TIME="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          TAGS="${REPO}:${SHORT},${REPO}:${FULL}"
          if [[ "${GITHUB_REF}" == "refs/heads/main" ]]; then
            TAGS="${TAGS},${REPO}:latest"
          fi
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            TAGS="${TAGS},${REPO}:${GITHUB_REF##refs/tags/}"
          fi
          echo "tags=${TAGS}"           >> "${GITHUB_OUTPUT}"
          echo "short_sha=${SHORT}"     >> "${GITHUB_OUTPUT}"
          echo "full_sha=${FULL}"       >> "${GITHUB_OUTPUT}"
          echo "build_time=${BUILD_TIME}" >> "${GITHUB_OUTPUT}"

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          build-args: |
            GIT_SHA=${{ steps.meta.outputs.full_sha }}
            GIT_REF=${{ github.ref_name }}
            BUILD_TIME=${{ steps.meta.outputs.build_time }}
            IMAGE_TAG=${{ steps.meta.outputs.short_sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Summary
        run: |
          echo "### Built backend image" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Tags:" >> $GITHUB_STEP_SUMMARY
          echo "${{ steps.meta.outputs.tags }}" | tr ',' '\n' | sed 's/^/- /' >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Deploy with: \`./bin/upgrade deploy --ref ${{ steps.meta.outputs.short_sha }} --build registry\`" >> $GITHUB_STEP_SUMMARY
